<!DOCTYPE html>
<html>
<head>
    <title>Meteo Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <h1>Meteo Dashboard</h1>
        <div class="user-greeting">
            <span>Hello, {{ username }}!</span>
            <div class="dropdown">
                <button type="button" class="menu-btn">⚙️ Manage</button>
                <div class="dropdown-content">
                    <button type="button" onclick="showAddDeviceModal()">+ Add Device</button>
                    <button type="button" onclick="showAddMeasurementTypeModal()">+ Add Measurement Type</button>
                    <button type="button" onclick="showRemoveSensorModal()">- Remove Sensor</button>
                    <button type="button" onclick="showRemoveDeviceModal()">- Remove Device</button>
                    <button type="button" onclick="showAlertsModal()">📋 View Alerts</button>
                </div>
            </div>
            <button type="button" onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>
    <script>
        const devices = {{ devices | tojson }};
        const measurementTypes = {{ measurement_types | tojson }};
    </script>
    <div class="chart-controls">
        <div class="form-group">
            <label>Time Range (applies to all)</label>
            <select id="timeRange" onchange="loadAllCharts()">
                <option value="1">Last Hour</option>
                <option value="24" selected>Last 24 Hours</option>
                <option value="168">Last 7 Days</option>
                <option value="720">Last 30 Days</option>
            </select>
        </div>
    </div>
    <div id="chartsContainer" class="charts-grid"></div>
    
    <!-- Modals -->
    <div id="modalOverlay" class="modal-overlay" style="display:none;">
        <!-- Add Device Modal -->
        <div id="addDeviceModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Add Device</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Device Name</label>
                    <input type="text" id="newDeviceName" placeholder="My Weather Station">
                </div>
                <div class="form-group">
                    <label>Serial Number</label>
                    <input type="text" id="newDeviceSerial" placeholder="WS-001">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="newDeviceLocation" placeholder="Balcony">
                </div>
                <div class="form-group">
                    <label>Sensors (select measurement types)</label>
                    <div id="sensorCheckboxes"></div>
                </div>
                <button type="button" onclick="createDevice()">Create Device</button>
            </div>
        </div>

        <!-- Remove Sensor Modal -->
        <div id="removeSensorModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Remove Sensor</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select Sensor to Remove</label>
                    <select id="sensorToRemove"></select>
                </div>
                <button type="button" class="danger" onclick="deleteSensor()">Remove Sensor</button>
            </div>
        </div>

        <!-- Remove Device Modal -->
        <div id="removeDeviceModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Remove Device</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Select Device to Remove</label>
                    <select id="deviceToRemove"></select>
                </div>
                <p class="warning">Warning: This will also delete all sensors for this device!</p>
                <button type="button" class="danger" onclick="deleteDevice()">Remove Device</button>
            </div>
        </div>

        <!-- Add Measurement Type Modal -->
        <div id="addMeasurementTypeModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Add Measurement Type</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="newMeasTypeName" placeholder="e.g., wind_speed">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="newMeasTypeUnit" placeholder="e.g., m/s, km/h, mm">
                </div>
                <button type="button" onclick="createMeasurementType()">Create</button>
            </div>
        </div>

        <!-- View Alerts Modal -->
        <div id="alertsModal" class="modal" style="display:none; width: 600px;">
            <div class="modal-header">
                <h3>Manage Alerts</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <!-- Add new alert -->
                <div class="alert-form-inline">
                    <h4>Create New Alert</h4>
                    <div class="form-row">
                        <select id="newAlertSensor">
                            <option value="">Select Sensor</option>
                        </select>
                        <select id="newAlertType">
                            <option value="max">Max</option>
                            <option value="min">Min</option>
                        </select>
                        <input id="newAlertValue" type="number" step="0.5" placeholder="Value">
                        <button type="button" onclick="createAlertFromModal()">Add</button>
                    </div>
                </div>
                <!-- Existing alerts -->
                <h4>Existing Alerts</h4>
                <div id="alertsList"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</body>
</html>
