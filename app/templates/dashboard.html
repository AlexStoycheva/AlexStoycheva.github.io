<!DOCTYPE html>
<html>
<head>
    <title>Meteo Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <h1>Meteo Dashboard</h1>
        <div class="user-greeting">
            <span>Hello, {{ username }}!</span>
            <div class="dropdown">
                <button type="button" class="menu-btn">⚙️ Manage</button>
                <div class="dropdown-content">
                    <button type="button" onclick="showManageDevicesModal()">Manage Devices</button>
                    <button type="button" onclick="showManageSensorsModal()">Manage Sensors</button>
                    {% if is_admin %}
                    <button type="button" onclick="showManageMeasurementTypesModal()">Manage Measurement Types</button>
                    <button type="button" onclick="showManageUsersModal()">Manage Users</button>
                    {% endif %}
                    <button type="button" onclick="showAlertsModal()">📋 View Alerts</button>
                </div>
            </div>
            <button type="button" onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>
    <script>
        const devices = {{ devices | tojson }};
        const measurementTypes = {{ measurement_types | tojson }};
        const isAdmin = {{ is_admin | tojson }};
    </script>
    <div class="chart-controls">
        <div class="form-group">
            <label>Time Range (applies to all)</label>
            <select id="timeRange" onchange="loadAllCharts()">
                <option value="1">Last Hour</option>
                <option value="24" selected>Last 24 Hours</option>
                <option value="168">Last 7 Days</option>
                <option value="720">Last 30 Days</option>
            </select>
        </div>
    </div>
    <div id="chartsContainer" class="charts-grid"></div>
    
    <div id="modalOverlay" class="modal-overlay" style="display:none;">
        <div id="addDeviceModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Add Device</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Device Name</label>
                    <input type="text" id="newDeviceName" placeholder="My Weather Station">
                </div>
                <div class="form-group">
                    <label>Serial Number</label>
                    <input type="text" id="newDeviceSerial" placeholder="WS-001">
                </div>
                <div class="form-group">
                    <label>Pass Key</label>
                    <input type="text" id="newDevicePasskey" placeholder="XXXX-XXXX-XXXX-XXXX">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="newDeviceLocation" placeholder="Gabrovo - Balcony">
                </div>
                <div class="form-group">
                    <label>Sensors</label>
                    <div id="deviceSensorCheckboxes" class="checkbox-list"></div>
                </div>
                <button type="button" onclick="createDevice()">Create Device</button>
            </div>
        </div>

        <div id="manageDevicesModal" class="modal wide-modal" style="display:none;">
            <div class="modal-header">
                <h3>Devices</h3>
                <div class="modal-header-actions">
                    <button type="button" class="add-inline-btn" onclick="showAddDeviceModal()">Add +</button>
                    <button type="button" class="close-modal" onclick="closeModals()">×</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="devicesList"></div>
            </div>
        </div>

        <div id="manageSensorsModal" class="modal wide-modal" style="display:none;">
            <div class="modal-header">
                <h3>Sensors</h3>
                <div class="modal-header-actions">
                    <button type="button" class="add-inline-btn" onclick="showAddSensorModal()">Add +</button>
                    <button type="button" class="close-modal" onclick="closeModals()">×</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="sensorsList"></div>
            </div>
        </div>

        <div id="addSensorModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Add Sensor</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Device</label>
                    <select id="newSensorDevice"></select>
                </div>
                <div class="form-group">
                    <label>Measurement Type</label>
                    <select id="newSensorMeasurementType"></select>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="newSensorName" placeholder="Sensor name">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <select id="newSensorLocation">
                        <option value="indoor">indoor</option>
                        <option value="outdoor">outdoor</option>
                    </select>
                </div>
                <button type="button" onclick="createSensor()">Create Sensor</button>
            </div>
        </div>

        <div id="addMeasurementTypeModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Add Measurement Type</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="newMeasTypeName" placeholder="e.g., wind_speed">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="newMeasTypeUnit" placeholder="e.g., m/s, km/h, mm">
                </div>
                <button type="button" onclick="createMeasurementType()">Create</button>
            </div>
        </div>

        <div id="manageMeasurementTypesModal" class="modal wide-modal" style="display:none;">
            <div class="modal-header">
                <h3>Measurement Types</h3>
                <div class="modal-header-actions">
                    <button type="button" class="add-inline-btn" onclick="showAddMeasurementTypeModal()">Add +</button>
                    <button type="button" class="close-modal" onclick="closeModals()">×</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="measurementTypesList"></div>
            </div>
        </div>

        <div id="addUserModal" class="modal" style="display:none;">
            <div class="modal-header">
                <h3>Add User</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="newUserEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="newUserPassword" placeholder="Temporary password">
                </div>
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="newUserFirstName" placeholder="First name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="newUserLastName" placeholder="Last name">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="newUserRole">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="button" onclick="createUser()">Create User</button>
            </div>
        </div>

        <div id="manageUsersModal" class="modal wide-modal" style="display:none;">
            <div class="modal-header">
                <h3>Users</h3>
                <div class="modal-header-actions">
                    <button type="button" class="add-inline-btn" onclick="showAddUserModal()">Add +</button>
                    <button type="button" class="close-modal" onclick="closeModals()">×</button>
                </div>
            </div>
            <div class="modal-body">
                <div id="usersList"></div>
            </div>
        </div>

        <div id="alertsModal" class="modal" style="display:none; width: 800px;">
            <div class="modal-header">
                <h3>Manage Alerts</h3>
                <button type="button" class="close-modal" onclick="closeModals()">×</button>
            </div>
            <div class="modal-body">
                <div class="alert-form-inline">
                    <h4>Create New Alert</h4>
                    <div class="form-row">
                        <select id="newAlertSensor">
                            <option value="">Select Sensor</option>
                        </select>
                        <select id="newAlertType">
                            <option value="max">Max</option>
                            <option value="min">Min</option>
                        </select>
                        <input id="newAlertValue" type="number" step="0.5" placeholder="Value">
                        <button type="button" onclick="createAlertFromModal()">Add</button>
                    </div>
                </div>
                <h4>Existing Alerts</h4>
                <div id="alertsList"></div>
                <h4>Alert History</h4>
                <div id="alertHistoryList"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</body>
</html>
