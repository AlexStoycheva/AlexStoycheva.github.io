<!DOCTYPE html>
<html>
<head>
    <title>Meteo Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="header">
        <h1>Meteo Dashboard</h1>
        <div class="user-greeting">
            <span>Hello, {{ username }}!</span>
            <button type="button" onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>
    <script>
        const devices = {{ devices | tojson }};
        const measurementTypes = {{ measurement_types | tojson }};
    </script>
    {% if is_admin %}
    <div class="alert-form">
        <h3>Create Alert</h3>
        <div class="alert-controls">
            <div class="form-group">
                <label>Device</label>
                <select id="deviceSelect" onchange="loadSensors()">
                    <option value="">Select</option>
                </select>
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="measurementTypeSelect" onchange="updateSensorOptions()">
                    <option value="">Select</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sensor</label>
                <select id="sensorSelect">
                    <option value="">Select</option>
                </select>
            </div>
            <div class="form-group">
                <label>Alert</label>
                <select id="alertType">
                    <option value="max">Max</option>
                    <option value="min">Min</option>
                </select>
            </div>
            <div class="form-group">
                <label>Value</label>
                <input id="alertValue" type="number" step="0.1" placeholder="0.0">
            </div>
            <button type="button" onclick="createAlert()">Save</button>
        </div>
    </div>
    {% endif %}
    <div class="chart-controls">
        <div class="form-group">
            <label>Chart Sensor</label>
            <select id="chartSensorSelect" onchange="loadChart()">
                <option value="">Select Sensor</option>
            </select>
        </div>
        <div class="form-group">
            <label>Time Range</label>
            <select id="timeRange" onchange="loadChart()">
                <option value="1">Last Hour</option>
                <option value="24" selected>Last 24 Hours</option>
                <option value="168">Last 7 Days</option>
                <option value="720">Last 30 Days</option>
            </select>
        </div>
    </div>
    <div class="current-reading">
        <span class="reading-label">Current:</span>
        <span id="currentValue">--</span>
        <span id="currentUnit"></span>
    </div>
    <canvas id="chart"></canvas>
    <script src="/static/js/main.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</body>
</html>
