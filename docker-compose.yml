version: "3.9"

services:
  db:
    image: postgres:15
    container_name: meteo_db
    restart: always
    environment:
      POSTGRES_USER: meteo_user
      POSTGRES_PASSWORD: meteo_pass
      POSTGRES_DB: meteo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: meteo_backend
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always

volumes:
  postgres_data:
